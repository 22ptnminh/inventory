<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gift Execute Flow — Interactive Flowchart</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f1f5f9; color: #1e293b; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* HEADER */
.header { background: linear-gradient(135deg, #3b82f6, #6366f1); color: white; padding: 14px 24px; display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
.header h1 { font-size: 17px; font-weight: 700; }
.header p { font-size: 12px; opacity: 0.8; margin-top: 2px; }

/* TABS */
.tabs { display: flex; background: white; border-bottom: 2px solid #e2e8f0; padding: 0 24px; flex-shrink: 0; }
.tab { padding: 12px 20px; font-size: 13px; font-weight: 600; cursor: pointer; border-bottom: 3px solid transparent; margin-bottom: -2px; color: #64748b; transition: all 0.15s; }
.tab:hover { color: #1e293b; }
.tab.active { color: #3b82f6; border-bottom-color: #3b82f6; }
.tab.active.green { color: #10b981; border-bottom-color: #10b981; }

/* MAIN LAYOUT */
.main { display: flex; flex: 1; overflow: hidden; }

/* CANVAS AREA */
.canvas-wrap { flex: 1; overflow: auto; position: relative; background: #f8fafc; }
.canvas-wrap svg { display: block; }

/* SIDE PANEL */
.panel { width: 420px; background: white; border-left: 1px solid #e2e8f0; overflow-y: auto; overflow-x: hidden; flex-shrink: 0; transition: width 0.2s; }
.panel.hidden { width: 0; overflow: hidden; border: none; }
.panel-inner { padding: 20px; min-width: 0; width: 100%; box-sizing: border-box; }
.panel-close { position: absolute; top: 10px; right: 14px; background: none; border: none; font-size: 18px; cursor: pointer; color: #94a3b8; }
.panel-close:hover { color: #1e293b; }
.panel-header { margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid #e2e8f0; position: relative; padding-right: 28px; }
.panel-layer { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
.panel-title { font-size: 16px; font-weight: 700; color: #1e293b; }
.panel-desc { font-size: 13px; color: #475569; line-height: 1.6; margin-top: 6px; }

.section-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #94a3b8; margin: 14px 0 8px; }

/* VALIDATE LIST */
.validate-list { display: flex; flex-direction: column; gap: 6px; }
.validate-item { display: flex; gap: 8px; font-size: 12px; color: #374151; line-height: 1.5; }
.validate-item::before { content: '✓'; color: #6366f1; font-weight: 700; flex-shrink: 0; }
.validate-item code { background: #f1f5f9; padding: 1px 5px; border-radius: 3px; font-size: 11px; color: #5b21b6; }

/* ERROR / SUCCESS */
.error-box { background: #fef2f2; border: 1px solid #fecaca; border-radius: 6px; padding: 8px 12px; margin-top: 6px; }
.error-code { font-size: 11px; font-weight: 700; color: #b91c1c; font-family: monospace; }
.error-desc { font-size: 11px; color: #7f1d1d; margin-top: 2px; }
.success-box { background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 6px; padding: 8px 12px; margin-top: 6px; }
.success-code { font-size: 11px; font-weight: 700; color: #14532d; font-family: monospace; }
.success-desc { font-size: 11px; color: #14532d; margin-top: 2px; }

/* DB CARDS */
.entity-block { margin-top: 12px; }
.entity-name { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: #7c3aed; background: #f5f3ff; border: 1px solid #e9d5ff; padding: 4px 10px; border-radius: 6px 6px 0 0; display: block; }
.db-rows { border: 1px solid #e9d5ff; border-top: none; border-radius: 0 0 6px 6px; overflow: hidden; }
.db-row { padding: 8px 10px; border-bottom: 1px solid #f1f5f9; }
.db-row:last-child { border-bottom: none; }
.db-row.is-insert { border-left: 3px solid #22c55e; background: #f0fdf4; }
.db-row.is-update { border-left: 3px solid #f59e0b; background: #fffbeb; }
.db-row-head { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
.badge-insert { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 9px; font-weight: 700; background: #22c55e; color: white; flex-shrink: 0; }
.badge-update { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 9px; font-weight: 700; background: #f59e0b; color: white; flex-shrink: 0; }
.db-row-field { font-family: monospace; font-size: 10px; color: #5b21b6; font-weight: 600; word-break: break-word; flex: 1; }
.db-row-arrow { display: flex; align-items: center; gap: 6px; font-size: 10px; flex-wrap: wrap; }
.db-row-from { font-family: monospace; color: #94a3b8; background: #f1f5f9; padding: 1px 5px; border-radius: 3px; }
.db-arrow { color: #94a3b8; }
.db-row-to { font-family: monospace; color: #047857; font-weight: 600; background: #dcfce7; padding: 1px 5px; border-radius: 3px; word-break: break-word; }
.db-row-note { font-size: 10px; color: #64748b; margin-top: 3px; line-height: 1.4; word-break: break-word; }

/* IO TAB */
.io-block { margin-bottom: 12px; }
.io-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; display: flex; align-items: center; gap: 5px; }
.io-label.input { color: #0369a1; }
.io-label.output { color: #15803d; }
.io-label.output-err { color: #b91c1c; }
.io-pre { background: #0f172a; color: #e2e8f0; border-radius: 6px; padding: 10px 12px; font-family: monospace; font-size: 10.5px; line-height: 1.55; white-space: pre-wrap; word-break: break-word; max-height: 320px; overflow-y: auto; }
.io-pre .k { color: #93c5fd; }   /* key */
.io-pre .s { color: #86efac; }   /* string value */
.io-pre .n { color: #fda4af; }   /* number */
.io-pre .b { color: #fbbf24; }   /* bool/null */
.io-pre .c { color: #64748b; font-style: italic; }  /* comment */
.io-separator { border: none; border-top: 1px solid #f1f5f9; margin: 10px 0; }

/* HINT */
.hint { position: absolute; bottom: 16px; left: 16px; background: white; border: 1px solid #e2e8f0; border-radius: 8px; padding: 8px 14px; font-size: 12px; color: #64748b; box-shadow: 0 2px 8px rgba(0,0,0,0.08); pointer-events: none; }

/* PANEL INNER TABS */
.ptabs { display: flex; border-bottom: 2px solid #e2e8f0; margin: 0 -20px 16px; padding: 0 20px; gap: 0; }
.ptab { padding: 8px 14px; font-size: 12px; font-weight: 600; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; color: #94a3b8; transition: all 0.15s; white-space: nowrap; }
.ptab:hover { color: #1e293b; }
.ptab.active { color: #6366f1; border-bottom-color: #6366f1; }
.ptab-content { display: none; }
.ptab-content.active { display: block; }

/* SCHEMA TABLE */
.schema-table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 4px; }
.schema-table th { background: #1e293b; color: #94a3b8; padding: 5px 8px; text-align: left; font-size: 10px; font-weight: 600; }
.schema-table th:first-child { border-radius: 4px 0 0 0; }
.schema-table th:last-child { border-radius: 0 4px 0 0; }
.schema-table td { padding: 5px 8px; border-bottom: 1px solid #f1f5f9; vertical-align: top; }
.schema-table tr:last-child td { border-bottom: none; }
.schema-table tr:hover td { background: #f8fafc; }
.schema-col-name { font-family: monospace; font-size: 11px; color: #1d4ed8; font-weight: 600; word-break: break-word; max-width: 140px; }
.schema-col-type { font-family: monospace; font-size: 10px; color: #7c3aed; }
.schema-col-null { font-size: 10px; color: #94a3b8; text-align: center; }
.schema-col-note { font-size: 10px; color: #64748b; line-height: 1.4; word-break: break-word; }
.pk-badge { display: inline-block; background: #fbbf24; color: #78350f; font-size: 9px; font-weight: 700; padding: 0 4px; border-radius: 3px; margin-left: 4px; }
.fk-badge { display: inline-block; background: #a5b4fc; color: #3730a3; font-size: 9px; font-weight: 700; padding: 0 4px; border-radius: 3px; margin-left: 4px; }
.schema-entity-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: #7c3aed; background: #f5f3ff; border: 1px solid #e9d5ff; padding: 5px 10px; border-radius: 6px 6px 0 0; margin-top: 14px; display: flex; align-items: center; gap: 6px; }
.schema-entity-title:first-of-type { margin-top: 0; }
.schema-wrap { border: 1px solid #e9d5ff; border-top: none; border-radius: 0 0 6px 6px; overflow: hidden; margin-bottom: 2px; max-width: 100%; }
.schema-table { table-layout: fixed; }

/* EXAMPLE VIEW */
.ex-layout { display: flex; flex: 1; height: 100%; overflow: hidden; }
.ex-sidebar { width: 260px; border-right: 1px solid #e2e8f0; background: #fff; overflow-y: auto; flex-shrink: 0; display: flex; flex-direction: column; }
.ex-sidebar-header { padding: 14px 16px 8px; border-bottom: 1px solid #f1f5f9; }
.ex-sidebar-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #94a3b8; }
.ex-subtab { display: flex; flex-direction: column; padding: 8px; gap: 2px; border-bottom: 1px solid #f1f5f9; }
.ex-subtab-btn { padding: 9px 12px; border-radius: 7px; border: none; background: none; text-align: left; cursor: pointer; font-size: 13px; font-weight: 600; color: #64748b; transition: all 0.12s; }
.ex-subtab-btn:hover { background: #f1f5f9; color: #1e293b; }
.ex-subtab-btn.active { background: #ede9fe; color: #6366f1; }
.ex-step-list { padding: 8px; display: flex; flex-direction: column; gap: 2px; flex: 1; overflow-y: auto; }
.ex-step-item { display: flex; align-items: flex-start; gap: 10px; padding: 8px 10px; border-radius: 7px; cursor: pointer; transition: background 0.1s; }
.ex-step-item:hover { background: #f8fafc; }
.ex-step-item.active { background: #ede9fe; }
.ex-step-dot { width: 22px; height: 22px; border-radius: 50%; border: 2px solid #cbd5e1; background: #fff; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: #94a3b8; flex-shrink: 0; margin-top: 1px; transition: all 0.15s; }
.ex-step-item.active .ex-step-dot { background: #6366f1; border-color: #6366f1; color: #fff; }
.ex-step-item.done .ex-step-dot { background: #22c55e; border-color: #22c55e; color: #fff; }
.ex-step-info { flex: 1; min-width: 0; }
.ex-step-label { font-size: 12px; font-weight: 600; color: #1e293b; line-height: 1.4; }
.ex-step-item.active .ex-step-label { color: #6366f1; }
.ex-step-sublabel { font-size: 10px; color: #94a3b8; margin-top: 2px; }
.ex-connector { width: 2px; height: 10px; background: #e2e8f0; margin: 0 auto 0 20px; }

.ex-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.ex-nav-bar { display: flex; align-items: center; gap: 10px; padding: 10px 20px; background: #fff; border-bottom: 1px solid #e2e8f0; flex-shrink: 0; }
.ex-nav-btn { padding: 6px 16px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; border: 1.5px solid #e2e8f0; background: #fff; color: #64748b; transition: all 0.12s; }
.ex-nav-btn:hover:not(:disabled) { border-color: #6366f1; color: #6366f1; }
.ex-nav-btn:disabled { opacity: 0.35; cursor: default; }
.ex-nav-btn.primary { background: #6366f1; border-color: #6366f1; color: #fff; }
.ex-nav-btn.primary:hover { background: #4f46e5; }
.ex-counter { font-size: 12px; color: #94a3b8; min-width: 56px; text-align: center; }
.ex-step-title { font-size: 15px; font-weight: 700; color: #1e293b; flex: 1; }

.ex-content { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 24px 28px; display: flex; flex-wrap: wrap; gap: 20px; align-content: flex-start; }
.ex-col { flex: 1; min-width: 0; overflow: hidden; display: flex; flex-direction: column; gap: 14px; }
.ex-col-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #94a3b8; padding-bottom: 8px; border-bottom: 1px solid #f1f5f9; }

.ex-request-box { background: #0f172a; border-radius: 8px; padding: 14px 16px; }
.ex-request-label { font-size: 10px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
.ex-request-pre { font-family: monospace; font-size: 11px; line-height: 1.6; color: #e2e8f0; white-space: pre-wrap; word-break: break-word; }
.ex-request-pre .ek { color: #93c5fd; }
.ex-request-pre .ev { color: #86efac; }
.ex-request-pre .en { color: #fda4af; }

.ex-db-section { }
.ex-db-table-name { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: #7c3aed; background: #f5f3ff; border: 1px solid #e9d5ff; padding: 5px 10px; border-radius: 6px 6px 0 0; }
.ex-db-row-wrap { border: 1px solid #e9d5ff; border-top: none; border-radius: 0 0 6px 6px; overflow: hidden; }
.ex-db-record { padding: 10px 12px; border-bottom: 1px solid #f1f5f9; }
.ex-db-record:last-child { border-bottom: none; }
.ex-db-record.is-new { border-left: 3px solid #22c55e; background: #f0fdf4; animation: flashGreen 0.5s ease; }
.ex-db-record.is-upd { border-left: 3px solid #f59e0b; background: #fffbeb; animation: flashAmber 0.5s ease; }
.ex-db-record.is-ctx { border-left: 3px solid #cbd5e1; background: #f8fafc; }
@keyframes flashGreen { from { background: #bbf7d0; } to { background: #f0fdf4; } }
@keyframes flashAmber { from { background: #fde68a; } to { background: #fffbeb; } }
.ex-db-op-badge { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 9px; font-weight: 700; margin-right: 6px; }
.ex-db-op-badge.ins { background: #22c55e; color: #fff; }
.ex-db-op-badge.upd { background: #f59e0b; color: #fff; }
.ex-db-op-badge.ctx { background: #94a3b8; color: #fff; }
.ex-db-field-row { display: flex; gap: 6px; align-items: baseline; margin-top: 4px; font-size: 11px; flex-wrap: wrap; }
.ex-db-field-key { font-family: monospace; font-size: 10px; color: #5b21b6; font-weight: 600; flex-shrink: 0; }
.ex-db-field-sep { color: #94a3b8; }
.ex-db-field-val { font-family: monospace; font-size: 10px; color: #0f766e; font-weight: 500; word-break: break-all; }
.ex-db-field-val.old { color: #94a3b8; text-decoration: line-through; margin-right: 2px; }
.ex-db-field-val.new { color: #059669; font-weight: 700; }
.ex-note { font-size: 11px; color: #475569; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 6px; padding: 10px 12px; line-height: 1.6; }
.ex-note strong { color: #1e293b; }

/* VALIDATE CHECKLIST */
.ex-vld-list { display: flex; flex-direction: column; gap: 0; border: 1px solid #e2e8f0; border-radius: 8px; overflow: hidden; width: 100%; }
.ex-vld-item { display: flex; align-items: flex-start; gap: 10px; padding: 9px 12px; border-bottom: 1px solid #f1f5f9; background: #fff; transition: background 0.2s; }
.ex-vld-item:last-child { border-bottom: none; }
.ex-vld-item[data-state="pending"] { background: #fff; }
.ex-vld-item[data-state="checking"] { background: #fffbeb; }
.ex-vld-item[data-state="pass"] { background: #f0fdf4; }
.ex-vld-item[data-state="fail"] { background: #fef2f2; }
.ex-vld-icon { width: 18px; height: 18px; flex-shrink: 0; margin-top: 1px; position: relative; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; }
.vld-pending { color: #cbd5e1; }
.vld-checking, .vld-pass, .vld-fail { display: none; }
.ex-vld-item[data-state="pending"] .vld-pending { display: block; }
.ex-vld-item[data-state="pending"] .vld-checking,
.ex-vld-item[data-state="pending"] .vld-pass,
.ex-vld-item[data-state="pending"] .vld-fail { display: none; }
.ex-vld-item[data-state="checking"] .vld-pending { display: none; }
.ex-vld-item[data-state="checking"] .vld-checking { display: flex; align-items: center; }
.ex-vld-item[data-state="pass"] .vld-pending,
.ex-vld-item[data-state="pass"] .vld-checking { display: none; }
.ex-vld-item[data-state="pass"] .vld-pass { display: block; color: #16a34a; font-size: 14px; }
.ex-vld-item[data-state="fail"] .vld-pending,
.ex-vld-item[data-state="fail"] .vld-checking { display: none; }
.ex-vld-item[data-state="fail"] .vld-fail { display: block; color: #dc2626; font-size: 14px; }
.vld-spinner { width: 13px; height: 13px; border: 2px solid #fde68a; border-top-color: #f59e0b; border-radius: 50%; animation: spin 0.5s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.ex-vld-body { flex: 1; min-width: 0; overflow: hidden; word-break: break-word; overflow-wrap: anywhere; }
.ex-vld-text { font-size: 12px; color: #374151; line-height: 1.5; word-break: break-word; overflow-wrap: anywhere; }
.ex-vld-item[data-state="checking"] .ex-vld-text { color: #92400e; font-weight: 600; }
.ex-vld-item[data-state="pass"] .ex-vld-text { color: #14532d; }
.ex-vld-item[data-state="fail"] .ex-vld-text { color: #991b1b; }
.ex-vld-result { font-size: 10px; font-family: monospace; color: #059669; background: #dcfce7; border-radius: 4px; padding: 2px 6px; margin-top: 4px; display: inline-block; }
.ex-vld-item[data-state="pending"] .ex-vld-result,
.ex-vld-item[data-state="checking"] .ex-vld-result { display: none; }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>Gift Execute Flow — Interactive Flowchart</h1>
    <p>Click vào node để xem validate conditions & DB changes</p>
  </div>
</div>

<div class="tabs" style="display:flex;align-items:center;gap:0">
  <div class="tab active" id="tab-client-btn" onclick="switchTab('client')">🏢 API Client (B2B)</div>
  <div class="tab" id="tab-enduser-btn" onclick="switchTab('enduser')">👤 API End-user (B2C)</div>
  <div class="tab" id="tab-errors-btn" onclick="switchTab('errors')">🚨 Error Codes</div>
  <div class="tab" id="tab-example-btn" onclick="switchTab('example')">🧪 Ví dụ thực tế</div>
  <div style="flex:1"></div>
  <button id="pres-enter" onclick="enterPresentationMode()" style="margin-right:16px;padding:6px 14px;border:1.5px solid #6366f1;background:#fff;color:#6366f1;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px">▶ Trình chiếu</button>
</div>

<div id="pres-bar" style="display:none;align-items:center;gap:10px;padding:8px 20px;background:#1e293b;border-bottom:1px solid #334155;position:sticky;top:0;z-index:50">
  <button id="pres-prev" onclick="presPrev()" disabled style="padding:5px 14px;border:1px solid #475569;background:#334155;color:#e2e8f0;border-radius:6px;font-size:13px;cursor:pointer;font-weight:600">← Trước</button>
  <button id="pres-next" onclick="presNext()" style="padding:5px 14px;border:none;background:#6366f1;color:#fff;border-radius:6px;font-size:13px;cursor:pointer;font-weight:600">Tiếp →</button>
  <span id="pres-counter" style="color:#94a3b8;font-size:12px;min-width:60px;text-align:center">1 / 1</span>
  <span style="color:#475569;font-size:11px;margin-left:4px">← → để điều hướng · Esc để thoát</span>
  <div style="flex:1"></div>
  <button onclick="exitPresentationMode()" style="padding:5px 12px;border:1px solid #475569;background:transparent;color:#94a3b8;border-radius:6px;font-size:12px;cursor:pointer">✕ Thoát</button>
</div>

<div class="main">
  <div class="canvas-wrap" id="canvas-wrap">
    <svg id="flowchart"></svg>
  </div>
  <div class="panel hidden" id="panel">
    <div class="panel-inner" id="panel-inner"></div>
  </div>
</div>

<div id="error-codes-view" style="display:none;flex:1;overflow-y:auto;padding:32px 40px">
  <div style="max-width:960px;margin:0 auto"></div>
</div>

<div id="example-view" style="display:none;flex:1;overflow:hidden;flex-direction:column"></div>

<div class="hint">💡 Click vào node để xem chi tiết</div>

<script>
// ─── DATA ─────────────────────────────────────────────────
const LAYER_COLORS = {
  client:  { bg: '#dbeafe', border: '#3b82f6', text: '#1d4ed8', label: 'Client / Channel' },
  entity:  { bg: '#fef3c7', border: '#f59e0b', text: '#92400e', label: 'Entity Core (Gateway)' },
  urcard:  { bg: '#ede9fe', border: '#7c3aed', text: '#5b21b6', label: 'UrCard Core' },
  rewards: { bg: '#dcfce7', border: '#22c55e', text: '#14532d', label: 'Rewards Core' },
  branch:  { bg: '#e0f2fe', border: '#0284c7', text: '#0c4a6e', label: 'Branch' },
  error:   { bg: '#fee2e2', border: '#ef4444', text: '#991b1b', label: 'Error' },
  success: { bg: '#dcfce7', border: '#22c55e', text: '#14532d', label: 'Response' },

// ─── LAYOUT ENGINE ────────────────────────────────────────
// Layout: topological rank for y, col hint for x
// Nodes can have { col: N } to force x column position

function layoutFlow(flow) {
  const nodeMap = {};
  flow.nodes.forEach(n => nodeMap[n.id] = n);

  // Build adjacency
  const children = {}, parents = {};
  flow.nodes.forEach(n => { children[n.id] = []; parents[n.id] = []; });
  flow.edges.forEach(e => {
    if (children[e.from]) children[e.from].push(e.to);
    if (parents[e.to]) parents[e.to].push(e.from);
  });

  // Topological sort → assign rank (y)
  const rank = {};
  const visited = new Set();
  function dfs(id, r) {
    if (rank[id] === undefined || rank[id] < r) rank[id] = r;
    if (visited.has(id)) return;
    visited.add(id);
    (children[id] || []).forEach(c => dfs(c, r + 1));
  }
  dfs(flow.nodes[0].id, 0);

  // Group by rank
  const byRank = {};
  flow.nodes.forEach(n => {
    const r = rank[n.id] ?? 0;
    if (!byRank[r]) byRank[r] = [];
    byRank[r].push(n.id);
  });

  const NODE_W = 200, NODE_H = 88, PAD_X = 48, PAD_Y = 70;
  const pos = {};

  // Check if any node has col hint → use manual col layout
  const hasColHints = flow.nodes.some(n => n.col !== undefined);

  if (hasColHints) {
    // Determine max col used
    const maxCol = Math.max(...flow.nodes.map(n => n.col ?? 0));
    const totalW = (maxCol + 1) * (NODE_W + PAD_X);

    // For nodes without col hint, auto-assign within their rank group
    Object.keys(byRank).sort((a,b)=>a-b).forEach(r => {
      const ids = byRank[r];
      // Separate hinted vs auto
      const hinted = ids.filter(id => nodeMap[id].col !== undefined);
      const auto   = ids.filter(id => nodeMap[id].col === undefined);
      // Place hinted nodes first
      hinted.forEach(id => {
        const col = nodeMap[id].col;
        pos[id] = { x: col * (NODE_W + PAD_X), y: Number(r) * (NODE_H + PAD_Y) };
      });
      // Auto nodes: fill remaining cols
      const usedCols = new Set(hinted.map(id => nodeMap[id].col));
      let autoCol = 0;
      auto.forEach(id => {
        while (usedCols.has(autoCol)) autoCol++;
        pos[id] = { x: autoCol * (NODE_W + PAD_X), y: Number(r) * (NODE_H + PAD_Y) };
        usedCols.add(autoCol);
        autoCol++;
      });
    });
  } else {
    // Default: center each rank
    const maxWidth = Math.max(...Object.values(byRank).map(ids => ids.length)) * (NODE_W + PAD_X);
    Object.keys(byRank).sort((a,b)=>a-b).forEach(r => {
      const ids = byRank[r];
      const rowW = ids.length * (NODE_W + PAD_X) - PAD_X;
      const offset = (maxWidth - rowW) / 2;
      ids.forEach((id, i) => {
        pos[id] = { x: offset + i * (NODE_W + PAD_X), y: Number(r) * (NODE_H + PAD_Y) };
      });
    });
  }

  return { pos, NODE_W, NODE_H };
}

// ─── SVG RENDERER ─────────────────────────────────────────
const SVG_NS = 'http://www.w3.org/2000/svg';

function el(tag, attrs={}, text='') {
  const e = document.createElementNS(SVG_NS, tag);
  Object.entries(attrs).forEach(([k,v]) => e.setAttribute(k, v));
  if (text) e.textContent = text;
  return e;
}

function renderFlow(flow) {
  const svg = document.getElementById('flowchart');
  svg.innerHTML = '';

  const { pos, NODE_W, NODE_H } = layoutFlow(flow);
  const PAD = 40;

  // Compute SVG size
  const xs = Object.values(pos).map(p => p.x);
  const ys = Object.values(pos).map(p => p.y);
  const W = Math.max(...xs) + NODE_W + PAD * 2;
  const H = Math.max(...ys) + NODE_H + PAD * 2;
  svg.setAttribute('width', W);
  svg.setAttribute('height', H);
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);

  // Defs: arrowhead
  const defs = el('defs');
  ['#64748b','#3b82f6','#22c55e','#ef4444'].forEach((color, i) => {
    const marker = el('marker', {id:`arr${i}`, markerWidth:8, markerHeight:6, refX:8, refY:3, orient:'auto'});
    marker.appendChild(el('polygon', {points:'0 0, 8 3, 0 6', fill: color}));
    defs.appendChild(marker);
  });
  svg.appendChild(defs);

  const nodeMap = {};
  flow.nodes.forEach(n => nodeMap[n.id] = n);

  // Draw edges
  flow.edges.forEach(edge => {
    const fp = pos[edge.from], tp = pos[edge.to];
    if (!fp || !tp) return;
    const fx = fp.x + NODE_W/2 + PAD, fy = fp.y + NODE_H + PAD;
    const tx = tp.x + NODE_W/2 + PAD, ty = tp.y + PAD;

    const toNode = nodeMap[edge.to];
    const isError = toNode?.layer === 'error';
    const isSuccess = toNode?.layer === 'success';
    const stroke = isError ? '#ef4444' : isSuccess ? '#22c55e' : '#94a3b8';
    const markerId = isError ? 'arr3' : isSuccess ? 'arr2' : 'arr0';

    const g = el('g', {class:'flow-edge', 'data-from':edge.from, 'data-to':edge.to});
    let path;
    if (Math.abs(fx - tx) < 5) {
      path = el('path', {d:`M${fx},${fy} L${tx},${ty}`, stroke, 'stroke-width':1.5, fill:'none', 'marker-end':`url(#${markerId})`});
    } else {
      const cy1 = fy + (ty - fy) * 0.4, cy2 = ty - (ty - fy) * 0.4;
      path = el('path', {d:`M${fx},${fy} C${fx},${cy1} ${tx},${cy2} ${tx},${ty}`, stroke, 'stroke-width':1.5, fill:'none', 'marker-end':`url(#${markerId})`});
    }
    g.appendChild(path);

    if (edge.label) {
      // Place label at 75% toward destination so sibling branches don't overlap
      const t = 0.75;
      const lx = fx + (tx - fx) * t;
      const ly = fy + (ty - fy) * t;
      const lines = edge.label.split('\n').filter(Boolean);
      const lineH = 13, padX = 8, padY = 4;
      const maxLen = Math.max(...lines.map(l => l.length));
      const bw = Math.max(52, maxLen * 6.2 + padX * 2);
      const bh = lines.length * lineH + padY * 2;
      const bx = lx - bw / 2, by = ly - bh / 2;
      g.appendChild(el('rect', {x:bx, y:by, width:bw, height:bh, rx:6, fill:'white', stroke, 'stroke-width':1, opacity:0.95}));
      lines.forEach((line, i) => {
        const t2 = el('text', {
          x: lx, y: by + padY + lineH * i + lineH * 0.75,
          'text-anchor':'middle', 'font-size':10, fill: stroke, 'font-weight':600
        }, line);
        g.appendChild(t2);
      });
    }
    svg.appendChild(g);
  });

  // Draw nodes
  flow.nodes.forEach(n => {
    const p = pos[n.id];
    if (!p) return;
    const x = p.x + PAD, y = p.y + PAD;
    const lc = LAYER_COLORS[n.layer] || LAYER_COLORS.urcard;
    const g = el('g', {class:'flow-node', 'data-id': n.id, style:'cursor:pointer'});

    if (n.shape === 'diamond') {
      const cx = x + NODE_W/2, cy = y + NODE_H/2;
      const hw = NODE_W/2, hh = NODE_H/2 + 4;
      g.appendChild(el('polygon', {
        points:`${cx},${cy-hh} ${cx+hw},${cy} ${cx},${cy+hh} ${cx-hw},${cy}`,
        fill: lc.bg, stroke: lc.border, 'stroke-width':2,
        rx:6
      }));
    } else {
      g.appendChild(el('rect', {x, y, width:NODE_W, height:NODE_H, rx:10,
        fill:lc.bg, stroke:lc.border, 'stroke-width':2}));
    }

    // Label (multiline)
    const lines = n.label.split('\n');
    const lineH = 14;
    const startY = y + NODE_H/2 - (lines.length-1)*lineH/2;
    lines.forEach((line, i) => {
      const t = el('text', {
        x: x + NODE_W/2,
        y: startY + i * lineH,
        'text-anchor':'middle',
        'dominant-baseline':'middle',
        'font-size': 12,
        'font-weight': i===0 ? 600 : 400,
        fill: lc.text
      }, line);
      g.appendChild(t);
    });

    g.addEventListener('click', () => {
      const idx = presentationOrder.indexOf(n.id);
      if (idx !== -1) { presentationStep = idx; applyPresentationStep(); }
      openPanel(n);
    });
    // hover effect
    g.addEventListener('mouseenter', () => {
      if (presentationActive && presentationOrder[presentationStep] !== n.id) return;
      const rect = g.querySelector('rect,polygon');
      if (rect) { rect.setAttribute('stroke-width', 3); rect.style.filter='drop-shadow(0 2px 6px rgba(0,0,0,0.18))'; }
    });
    g.addEventListener('mouseleave', () => {
      const rect = g.querySelector('rect,polygon');
      if (rect) { rect.setAttribute('stroke-width', presentationActive && presentationOrder[presentationStep] === n.id ? 3 : 2); rect.style.filter=''; }
    });
    svg.appendChild(g);
  });
}

const SKIP_COLS = new Set(['id','uuid','createdAt','createdBy','updatedAt','updatedBy','deletedAt','deletedBy']);

function renderSchemaTab(nodeId) {
  const tables = NODE_SCHEMAS[nodeId] || [];
  if (!tables.length) return `<div style="padding:20px 0;color:#94a3b8;font-size:13px;text-align:center">Bước này không thay đổi schema cụ thể</div>`;

  let html = '';
  tables.forEach(tbl => {
    const s = SCHEMAS[tbl];
    if (!s) return;
    const cols = s.cols.filter(c => !SKIP_COLS.has(c.name));
    html += `<div class="schema-entity-title">${s.label} <span style="font-size:10px;font-weight:400;color:#94a3b8">${s.note}</span></div>`;
    html += `<div class="schema-wrap"><table class="schema-table">`;
    html += `<tr><th>Column</th><th>Mô tả</th></tr>`;
    cols.forEach(c => {
      const pkBadge = c.pk ? '<span class="pk-badge">PK</span>' : '';
      const fkBadge = c.fk ? `<span class="fk-badge">FK</span>` : '';
      const desc = c.note + (c.fk ? ` → <em>${c.fk}</em>` : '');
      html += `<tr>
        <td class="schema-col-name">${c.name}${pkBadge}${fkBadge}</td>
        <td class="schema-col-note">${desc}</td>
      </tr>`;
    });
    html += `</table></div>`;
  });
  return html;
}

// ─── IO RENDERER ──────────────────────────────────────────
function jsonHL(obj) {
  const raw = JSON.stringify(obj, null, 2);
  return raw
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"([^"]+)":/g, '<span class="k">"$1"</span>:')
    .replace(/: "([^"]*)"/g, ': <span class="s">"$1"</span>')
    .replace(/: (true|false|null)/g, ': <span class="b">$1</span>')
    .replace(/: (-?\d+\.?\d*)/g, ': <span class="n">$1</span>')
    .replace(/\/\/ (.+)/g, '<span class="c">// $1</span>');
}

function renderIOTab(node) {
  if (!node.io) return `<div style="padding:20px 0;color:#94a3b8;font-size:13px;text-align:center">Không có I/O example cho bước này</div>`;
  const io = node.io;
  let html = '';

  if (io.input) {
    html += `<div class="io-block">
      <div class="io-label input">📥 Input</div>
      <pre class="io-pre">${jsonHL(io.input)}</pre>
    </div>`;
  }
  if (io.output_ok) {
    html += `<hr class="io-separator"><div class="io-block">
      <div class="io-label output">✅ Output (thành công)</div>
      <pre class="io-pre">${jsonHL(io.output_ok)}</pre>
    </div>`;
  }
  if (io.output_err) {
    html += `<hr class="io-separator"><div class="io-block">
      <div class="io-label output-err">❌ Output (lỗi)</div>
      <pre class="io-pre">${jsonHL(io.output_err)}</pre>
    </div>`;
  }
  return html || `<div style="padding:20px 0;color:#94a3b8;font-size:13px;text-align:center">Không có I/O example</div>`;
}

let activePanelTab = 'detail';

function switchPanelTab(tab) {
  activePanelTab = tab;
  document.querySelectorAll('.ptab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.querySelectorAll('.ptab-content').forEach(c => c.classList.toggle('active', c.dataset.tab === tab));

function openPanel(node) {
  const panel = document.getElementById('panel');
  const inner = document.getElementById('panel-inner');
  panel.classList.remove('hidden');
  const lc = LAYER_COLORS[node.layer] || LAYER_COLORS.urcard;
  const d = node.detail || {};

  // Build detail tab content
  let detailHtml = '';
  if (d.validates?.length) {
    detailHtml += `<div class="section-label">✓ Điều kiện validate</div><div class="validate-list">`;
    d.validates.forEach(v => {
      detailHtml += `<div class="validate-item">${v.replace(/`([^`]+)`/g, '<code>$1</code>')}</div>`;
    });
    detailHtml += `</div>`;
  }
  if (d.errors?.length) {
    detailHtml += `<div class="section-label">⚠ Lỗi có thể xảy ra</div>`;
    d.errors.forEach(e => detailHtml += `<div class="error-box"><div class="error-code">${e.code}</div><div class="error-desc">${e.desc}</div></div>`);
  }
  if (d.success) {
    detailHtml += `<div class="section-label">✅ Response</div>`;
    detailHtml += `<div class="success-box"><div class="success-code">${d.success.code}</div><div class="success-desc">${d.success.desc}</div></div>`;
  }
  if (d.db?.length) {
    detailHtml += `<div class="section-label">🗄 DB thay đổi</div>`;
    d.db.forEach(tbl => {
      detailHtml += `<div class="entity-block"><div class="entity-name">${tbl.table}</div>`;
      detailHtml += `<div class="db-rows">`;
      tbl.rows.forEach(r => {
        const isIns = r.op === 'insert';
        const badge = isIns ? '<span class="badge-insert">INSERT</span>' : '<span class="badge-update">UPDATE</span>';
        const arrowPart = (r.from && r.from !== '—' && r.to && r.to !== '—')
          ? `<div class="db-row-arrow"><span class="db-row-from">${r.from}</span><span class="db-arrow">→</span><span class="db-row-to">${r.to}</span></div>`
          : (r.to && r.to !== '—' ? `<div class="db-row-arrow"><span class="db-row-to">${r.to}</span></div>` : '');
        detailHtml += `<div class="db-row ${isIns ? 'is-insert' : 'is-update'}">
          <div class="db-row-head">${badge}<span class="db-row-field">${r.field}</span></div>
          ${arrowPart}
          ${r.note ? `<div class="db-row-note">${r.note}</div>` : ''}
        </div>`;
      });
      detailHtml += `</div></div>`;
    });
  }
  if (!detailHtml) detailHtml = `<div style="padding:20px 0;color:#94a3b8;font-size:13px;text-align:center">Không có điều kiện validate đặc biệt</div>`;

  const schemaHtml = renderSchemaTab(node.id);
  const hasSchema = (NODE_SCHEMAS[node.id] || []).length > 0;

  const html = `
    <div class="panel-header">
      <button class="panel-close" onclick="closePanel()">✕</button>
      <div class="panel-layer" style="color:${lc.text}">${lc.label}</div>
      <div class="panel-title">${node.label.replace(/\n/g,' ')}</div>
      ${d.desc ? `<div class="panel-desc">${d.desc}</div>` : ''}
    </div>
    <div class="ptabs">
      <div class="ptab active" data-tab="detail" onclick="switchPanelTab('detail')">Chi tiết</div>
      <div class="ptab${hasSchema ? '' : ' disabled'}" data-tab="schema" onclick="switchPanelTab('schema')" style="${hasSchema ? '' : 'opacity:0.4;cursor:default'}">Schema${hasSchema ? ` (${(NODE_SCHEMAS[node.id]||[]).length})` : ''}</div>
      <div class="ptab${node.io ? '' : ' disabled'}" data-tab="io" onclick="switchPanelTab('io')" style="${node.io ? '' : 'opacity:0.4;cursor:default'}">I/O</div>
    </div>
    <div class="ptab-content active" data-tab="detail">${detailHtml}</div>
    <div class="ptab-content" data-tab="schema">${schemaHtml}</div>
    <div class="ptab-content" data-tab="io">${renderIOTab(node)}</div>
  `;

  inner.innerHTML = html;
  // restore last active tab if switching nodes
  if (activePanelTab === 'schema' && hasSchema) switchPanelTab('schema');
  else if (activePanelTab === 'io' && node.io) switchPanelTab('io');
  else switchPanelTab('detail');
}

  document.getElementById('panel').classList.add('hidden');
}

function renderErrorCodes() {
  const groupDefs = [
    { key:'auth',    label:'🔐 Authentication & Authorization', color:'#fef3c7', border:'#f59e0b', range:[1001,1009] },
    { key:'idem',    label:'🔁 Idempotency',                   color:'#ede9fe', border:'#7c3aed', range:[1010,1019] },
    { key:'camp',    label:'📋 Campaign',                       color:'#dbeafe', border:'#3b82f6', range:[1020,1029] },
    { key:'card',    label:'💳 Card',                           color:'#dbeafe', border:'#0284c7', range:[1030,1039] },
    { key:'gift',    label:'🎁 GiftDetail',                     color:'#dcfce7', border:'#22c55e', range:[1040,1049] },
    { key:'subpo',   label:'💰 SubPO / Budget',                 color:'#fce7f3', border:'#db2777', range:[1050,1059] },
    { key:'bal',     label:'⚖️ Balance',                        color:'#fce7f3', border:'#db2777', range:[1060,1069] },
    { key:'fulfill', label:'🚚 Fulfill',                        color:'#fee2e2', border:'#ef4444', range:[5000,5999] },
  ];

  let html = `<h2 style="font-size:18px;font-weight:700;color:#1e293b;margin:0 0 24px">🚨 Error Codes</h2>`;

  groupDefs.forEach(grp => {
    const errors = ERROR_CODES.filter(e => {
      const n = parseInt(e.code);
      return n >= grp.range[0] && n <= grp.range[1];
    });
    if (!errors.length) return;
    const meta = grp;
    html += `<div style="margin-bottom:28px">
      <div style="font-size:13px;font-weight:700;color:${meta.border};background:${meta.color};border:1px solid ${meta.border};border-radius:8px 8px 0 0;padding:8px 16px">${meta.label}</div>
      <table style="width:100%;border-collapse:collapse;border:1px solid #e2e8f0;border-top:none;border-radius:0 0 8px 8px;overflow:hidden;font-size:12.5px">
        <thead>
          <tr style="background:#f8fafc">
            <th style="padding:8px 12px;text-align:left;color:#64748b;font-weight:600;border-bottom:1px solid #e2e8f0;white-space:nowrap;width:110px">Error Code</th>
            <th style="padding:8px 12px;text-align:left;color:#64748b;font-weight:600;border-bottom:1px solid #e2e8f0;white-space:nowrap;width:50px">HTTP</th>
            <th style="padding:8px 12px;text-align:left;color:#64748b;font-weight:600;border-bottom:1px solid #e2e8f0;width:180px">Message</th>
            <th style="padding:8px 12px;text-align:left;color:#64748b;font-weight:600;border-bottom:1px solid #e2e8f0">Mô tả</th>
            <th style="padding:8px 12px;text-align:left;color:#64748b;font-weight:600;border-bottom:1px solid #e2e8f0;white-space:nowrap;width:80px">Flow</th>
          </tr>
        </thead>
        <tbody>`;
    errors.forEach((e, i) => {
      const statusColor = e.httpStatus.startsWith('5') ? '#dc2626' : e.httpStatus.startsWith('4') ? '#d97706' : '#16a34a';
      const bg = i % 2 === 0 ? '#fff' : '#f8fafc';
      html += `<tr style="background:${bg}">
        <td style="padding:8px 12px;font-family:monospace;font-weight:700;color:#1e293b;border-bottom:1px solid #f1f5f9">${e.code}</td>
        <td style="padding:8px 12px;font-weight:700;color:${statusColor};border-bottom:1px solid #f1f5f9">${e.httpStatus}</td>
        <td style="padding:8px 12px;font-family:monospace;font-size:11.5px;color:#374151;border-bottom:1px solid #f1f5f9">${e.message}</td>
        <td style="padding:8px 12px;color:#374151;border-bottom:1px solid #f1f5f9;line-height:1.5">${e.desc}</td>
        <td style="padding:8px 12px;border-bottom:1px solid #f1f5f9"><span style="font-size:11px;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:4px;white-space:nowrap">${e.flow}</span></td>
      </tr>`;
    });
    html += `</tbody></table></div>`;
  });

  document.getElementById('error-codes-view').querySelector('div').innerHTML = html;
}

    document.getElementById('tab-errors-btn').classList.add('active');
    main.style.display = 'none';
    hint.style.display = 'none';
    errView.style.display = 'block';
    exView.style.display = 'none';
    renderErrorCodes();
    closePanel();
    return;
  }

  if (tab === 'example') {
    document.getElementById('tab-example-btn').classList.add('active');
    main.style.display = 'none';
    hint.style.display = 'none';
    errView.style.display = 'none';
    exStep = 0;
    renderExampleView();
    closePanel();
    return;
  }

  main.style.display = '';
  hint.style.display = '';
  errView.style.display = 'none';
  exView.style.display = 'none';

  if (tab === 'client') {
    document.getElementById('tab-client-btn').classList.add('active');
    renderFlow(CLIENT_FLOW);
  } else {
    document.getElementById('tab-enduser-btn').classList.add('active','green');
    renderFlow(ENDUSER_FLOW);
  }
  closePanel();
}

// ─── PRESENTATION MODE ────────────────────────────────────
let presentationActive = false;
let presentationStep = 0;
let presentationOrder = [];
let presentationFlow = null;

function buildPresentationOrder(flow) {
  // BFS/topological walk — follow edges in order, skip duplicates
  const edgeMap = {};
  flow.edges.forEach(e => {
    if (!edgeMap[e.from]) edgeMap[e.from] = [];
    edgeMap[e.from].push(e.to);
  });
  const visited = new Set();
  const order = [];
  const queue = [flow.nodes[0].id];
  while (queue.length) {
    const id = queue.shift();
    if (visited.has(id)) continue;
    visited.add(id);
    order.push(id);
    (edgeMap[id] || []).forEach(next => { if (!visited.has(next)) queue.push(next); });
  }
  // add any nodes not reachable via edges
  flow.nodes.forEach(n => { if (!visited.has(n.id)) order.push(n.id); });
  return order;
}

function applyPresentationStep() {
  if (!presentationActive) return;
  const activeId = presentationOrder[presentationStep];
  const svg = document.getElementById('flowchart');

  // dim/undim nodes
  svg.querySelectorAll('.flow-node').forEach(g => {
    const id = g.getAttribute('data-id');
    const isActive = id === activeId;
    g.style.opacity = isActive ? '1' : '0.18';
    g.style.pointerEvents = isActive ? '' : 'none';
    const rect = g.querySelector('rect,polygon');
    if (rect) rect.setAttribute('stroke-width', isActive ? 3 : 1.5);
  });

  // dim/undim edges (all path/text groups between nodes)
  svg.querySelectorAll('.flow-edge').forEach(g => {
    const from = g.getAttribute('data-from');
    const to = g.getAttribute('data-to');
    const isActive = from === activeId || to === activeId;
    g.style.opacity = isActive ? '1' : '0.1';
  });

  // update button states
  document.getElementById('pres-prev').disabled = presentationStep === 0;
  document.getElementById('pres-next').disabled = presentationStep === presentationOrder.length - 1;
  document.getElementById('pres-counter').textContent = `${presentationStep + 1} / ${presentationOrder.length}`;

  // open panel for active node
  const nodeMap = {};
  presentationFlow.nodes.forEach(n => nodeMap[n.id] = n);
  if (nodeMap[activeId]) openPanel(nodeMap[activeId]);
}

function enterPresentationMode() {
  const flow = currentTab === 'enduser' ? ENDUSER_FLOW : CLIENT_FLOW;
  presentationFlow = flow;
  presentationOrder = buildPresentationOrder(flow);
  presentationStep = 0;
  presentationActive = true;
  document.getElementById('pres-bar').style.display = 'flex';
  document.getElementById('pres-enter').style.display = 'none';
  applyPresentationStep();
}

function exitPresentationMode() {
  presentationActive = false;
  document.getElementById('pres-bar').style.display = 'none';
  document.getElementById('pres-enter').style.display = '';
  // restore all nodes
  const svg = document.getElementById('flowchart');
  svg.querySelectorAll('.flow-node').forEach(g => {
    g.style.opacity = '1';
    g.style.pointerEvents = '';
    const rect = g.querySelector('rect,polygon');
    if (rect) rect.setAttribute('stroke-width', 2);
  });
  svg.querySelectorAll('.flow-edge').forEach(g => { g.style.opacity = '1'; });
  closePanel();
}

function presNext() {
  if (presentationStep < presentationOrder.length - 1) { presentationStep++; applyPresentationStep(); }
}
function presPrev() {
  if (presentationStep > 0) { presentationStep--; applyPresentationStep(); }
}

// keyboard navigation
document.addEventListener('keydown', e => {
  if (!presentationActive) return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); presNext(); }
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   { e.preventDefault(); presPrev(); }
  if (e.key === 'Escape') exitPresentationMode();
});

// ─── VALIDATE ANIMATIONS ──────────────────────────────────
let _validateTimer = null;
function animateValidates(stepEl) {
  const items = stepEl.querySelectorAll('.ex-vld-item');
  items.forEach(el => { el.setAttribute('data-state','pending'); });
  let i = 0;
  function next() {
    if (i > 0) items[i-1].setAttribute('data-state','pass');
    if (i < items.length) {
      items[i].setAttribute('data-state','checking');
      i++;
      _validateTimer = setTimeout(next, 340);
    }
  }
  next();
}

function renderExRequest(req) {
  const methodColor = req.method === 'POST' ? '#86efac' : '#fda4af';
  let html = `<div class="ex-request-box">`;
  html += `<div class="ex-request-label" style="color:#64748b">${req.method} ${req.url}</div>`;
  if (req.headers) {
    html += `<div class="ex-request-pre" style="margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid #1e293b">`;
    Object.entries(req.headers).forEach(([k,v]) => {
      html += `<span class="ek">${escHtml(k)}</span><span style="color:#475569">: </span><span class="ev">"${escHtml(v)}"</span>\n`;
    });
    html += `</div>`;
  }
  if (req.body) {
    html += `<div class="ex-request-pre">${syntaxJson(req.body)}</div>`;
  }
  html += `</div>`;
  return html;
}

function renderExDbBlock(d) {
  const opClass = d.op === 'ins' ? 'ins' : d.op === 'upd' ? 'upd' : 'ctx';
  const opText = d.op === 'ins' ? 'INSERT' : d.op === 'upd' ? 'UPDATE' : 'READ';
  const recClass = d.op === 'ins' ? 'is-new' : d.op === 'upd' ? 'is-upd' : 'is-ctx';
  let html = `<div class="ex-db-section" style="margin-bottom:12px">`;
  html += `<div class="ex-db-table-name">${d.table}</div>`;
  html += `<div class="ex-db-row-wrap">`;
  html += `<div class="ex-db-record ${recClass}">`;
  html += `<div style="margin-bottom:6px"><span class="ex-db-op-badge ${opClass}">${opText}</span><span style="font-size:11px;color:#64748b">${d.label||''}</span></div>`;
  Object.entries(d.record).forEach(([k,v]) => {
    html += `<div class="ex-db-field-row">
      <span class="ex-db-field-key">${escHtml(k)}</span>
      <span class="ex-db-field-sep">:</span>
      <span class="ex-db-field-val">${escHtml(String(v))}</span>
    </div>`;
  });
  html += `</div></div></div>`;
  return html;
}

function syntaxJson(obj, indent=0) {
  const pad = '  '.repeat(indent);
  const pad1 = '  '.repeat(indent+1);
  if (typeof obj !== 'object' || obj === null) {
    if (typeof obj === 'string') return `<span class="ev">"${escHtml(obj)}"</span>`;
    if (typeof obj === 'number') return `<span class="en">${obj}</span>`;
    return `<span style="color:#fbbf24">${obj}</span>`;
  }
  if (Array.isArray(obj)) {
    if (!obj.length) return '[]';
    return `[\n${obj.map(v => pad1+syntaxJson(v,indent+1)).join(',\n')}\n${pad}]`;
  }
  const entries = Object.entries(obj);
  if (!entries.length) return '{}';
  return `{\n${entries.map(([k,v]) => `${pad1}<span class="ek">"${escHtml(k)}"</span>: ${syntaxJson(v,indent+1)}`).join(',\n')}\n${pad}}`;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// keyboard for example view
document.addEventListener('keydown', e => {
  if (currentTab !== 'example') return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); exNav(1); }
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   { e.preventDefault(); exNav(-1); }
});

renderFlow(CLIENT_FLOW);
</script>
</body>
